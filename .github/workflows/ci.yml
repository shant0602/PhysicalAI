name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint (fast gate — fails before tests run) ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + import sort)
        run: ruff check src/ tests/ scripts/ --exclude third_party/

      - name: Mypy (type check)
        run: mypy src/ --exclude third_party/

  # ── Job 2: Tests (runs after lint passes) ─────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install all dependencies
        run: pip install -e ".[dev,inference]"

      - name: Run tests with coverage
        # --cov-fail-under threshold is set in pyproject.toml [tool.pytest.ini_options]
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is down

  # ── Job 3: Inference Docker build (only on push to main) ──────────────────
  docker-build:
    name: Docker Build (inference)
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false          # validate build only, no registry push yet
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: physicalai:latest

  # ── Job 4: OpenVLA Training Docker build (only on push to main) ───────────
  docker-build-train:
    name: Docker Build (train)
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'    # required — populates third_party/openvla

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.train
          push: false
          # Prebuilt flash-attn wheel for CI (no CUDA on GitHub runners)
          build-args: |
            FLASH_ATTN_WHEEL=https://github.com/Dao-AILab/flash-attention/releases/download/v2.5.5/flash_attn-2.5.5+cu121torch2.2cxx11abiFALSE-cp310-cp310-linux_x86_64.whl
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: physicalai:train
        timeout-minutes: 60

  # ── Job 5: GR00T Training Docker build (only on push to main) ─────────────
  docker-build-groot:
    name: Docker Build (train-groot)
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'    # required — populates third_party/isaac_groot

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build GR00T training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.train.groot
          push: false
          # flash-attn build skipped in CI (no CUDA); passes --no-build-isolation
          build-args: |
            FLASH_ATTN_VERSION=2.7.1.post4
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: physicalai:train-groot
        timeout-minutes: 60
