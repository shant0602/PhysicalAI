name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint (fast gate — fails before tests run) ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + import sort)
        run: ruff check src/ tests/ scripts/

      - name: Mypy (type check)
        run: mypy src/

  # ── Job 2: Tests (runs after lint passes) ─────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install all dependencies
        run: pip install -e ".[dev,inference]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is down

  # ── Job 3: Docker build (only on push to main) ────────────────────────────
  docker-build:
    name: Docker Build
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false          # validate build only, no registry push yet
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: physicalai:latest
