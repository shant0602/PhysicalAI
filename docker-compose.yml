services:

  # ── Inference / training (GPU only) ───────────────────────────────────────
  # Use: docker compose --profile gpu run physicalai
  physicalai:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: physicalai:latest
    runtime: nvidia
    profiles: [gpu]                                # prevents accidental startup on Mac
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/home/appuser/.cache/huggingface
      - WANDB_API_KEY=${WANDB_API_KEY:-}           # set in .env or export in shell
    volumes:
      - .:/workspace                               # live code sync
      - hf-cache:/home/appuser/.cache/huggingface  # persists model weights
    working_dir: /workspace
    ipc: host                                      # needed for multi-GPU shared memory
    stdin_open: true
    tty: true

  # ── Development (GPU + Jupyter) ────────────────────────────────────────────
  # Use: docker compose --profile gpu up physicalai-dev
  # Requires physicalai:latest to be built first: make docker-build
  physicalai-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: physicalai:dev
    runtime: nvidia
    profiles: [gpu]                                # prevents accidental startup on Mac
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/home/appuser/.cache/huggingface
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - .:/workspace
      - hf-cache:/home/appuser/.cache/huggingface
    ports:
      - "127.0.0.1:8888:8888"                      # localhost only — not exposed to network
    working_dir: /workspace
    ipc: host

  # ── LoRA fine-tuning via OpenVLA (GPU only) ───────────────────────────────
  # Use: docker compose --profile gpu run physicalai-train
  #  or: make docker-train
  physicalai-train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: physicalai:train
    runtime: nvidia
    profiles: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/home/appuser/.cache/huggingface
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - WANDB_ENTITY=${WANDB_ENTITY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - NUM_GPUS=${NUM_GPUS:-1}
      # Training config — sourced from env (set via libero_lora.env or openvla_lora.env)
      - DATASET_NAME=${DATASET_NAME:-bridge_orig}
      - DATA_ROOT_DIR=${DATA_ROOT_DIR:-datasets/open-x-embodiment}
      - MAX_STEPS=${MAX_STEPS:-200000}
      - SAVE_STEPS=${SAVE_STEPS:-5000}
      - SHUFFLE_BUFFER_SIZE=${SHUFFLE_BUFFER_SIZE:-100000}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - LEARNING_RATE=${LEARNING_RATE:-5e-4}
      - LORA_RANK=${LORA_RANK:-32}
      - IMAGE_AUG=${IMAGE_AUG:-true}
      - WANDB_PROJECT=${WANDB_PROJECT:-physicalai-openvla}
    volumes:
      - .:/workspace
      - hf-cache:/home/appuser/.cache/huggingface
      - ./runs:/workspace/runs
      - ./adapter-tmp:/workspace/adapter-tmp
      - ${DATASET_DIR:-./datasets}:/workspace/datasets
    working_dir: /workspace
    ipc: host
    shm_size: "16gb"
    # All training config flows through environment variables above.
    # Source an env file before running to switch datasets:
    #   set -a && source configs/training/libero_lora.env && set +a
    #   docker compose --profile gpu run --rm physicalai-train
    command: scripts/train.sh

  # ── CPU-only (Mac local dev — import/config/unit testing, no GPU needed) ──
  # Use: docker compose run --rm physicalai-cpu pytest tests/ -v
  physicalai-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: physicalai:latest
    entrypoint: ["python", "-m"]
    environment:
      - HF_HOME=/home/appuser/.cache/huggingface
    volumes:
      - .:/workspace
      - hf-cache:/home/appuser/.cache/huggingface
    working_dir: /workspace

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  hf-cache:
    # HuggingFace model weights — persisted across container restarts.
    # To clear: docker compose down --volumes
