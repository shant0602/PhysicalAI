# OpenVLA LoRA fine-tuning config
# Designed for A100 80GB on Lambda Labs

model:
  model_id: "openvla/openvla-7b"
  device: "cuda:0"
  dtype: "bfloat16"
  quantize: false
  unnorm_key: "bridge_orig"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"    # passed through to LoRATrainingConfig.bias → peft.LoraConfig

data:
  split: "train"
  max_samples: 2000    # start small; remove cap for full training
  image_size: 224

training:
  output_dir: "checkpoints/openvla_lora"
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  save_every_n_steps: 200
  log_every_n_steps: 10
  seed: 42

wandb:
  project: "physicalai-openvla"
  run_name: "lora-bridge-v2"
